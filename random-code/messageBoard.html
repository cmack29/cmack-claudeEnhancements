<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Board</title>

  <!--
  ============================================================
  PSEUDOCODE — OVERVIEW
  ============================================================
  PROGRAM MessageBoard:
    DATA:
      messages = []   // in-memory list of message objects

    ON LOAD:
      Render empty board state

    ON USER TYPES in textarea:
      Update character counter (warn at 60, red at 20)

    ON POST BUTTON CLICK (or Ctrl+Enter):
      IF message text is empty → do nothing
      ELSE:
        Create message object { id, author, text, time, likes, liked }
        Prepend to messages[]
        Clear textarea
        Re-render board

    ON LIKE CLICK(id):
      Find message by id
      Toggle liked flag
      Increment or decrement likes count
      Re-render board

    ON DELETE CLICK(id):
      Remove message from messages[] by id
      Re-render board

    RENDER BOARD:
      IF messages is empty → show empty state
      ELSE → map each message to an HTML card and inject into DOM
  ============================================================
  -->

  <style>
    /* --------------------------------------------------------
       PSEUDOCODE — STYLES
       Set dark navy background, gold accent colour (#c9a84c)
       Georgia serif for body, monospace for meta/timestamps
       Cards have left gold border, fade-in animation on entry
    -------------------------------------------------------- */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2.2rem; letter-spacing: 0.05em; color: #c9a84c; }
    header p  { font-size: 0.85rem; color: #888; margin-top: 0.3rem; font-family: monospace; letter-spacing: 0.1em; }

    .container { max-width: 680px; margin: 0 auto; }

    /* --- POST FORM --- */
    /* Pseudocode: dark panel containing name input, message textarea, char counter, post button */
    .post-form {
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 2rem;
    }

    .post-form input,
    .post-form textarea {
      width: 100%;
      background: #0f0f23;
      border: 1px solid #2a2a5a;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.8rem;
      outline: none;
      transition: border-color 0.2s; /* highlight border gold on focus */
    }

    .post-form input:focus,
    .post-form textarea:focus { border-color: #c9a84c; }

    .post-form input::placeholder,
    .post-form textarea::placeholder { color: #555; }

    .post-form textarea { resize: vertical; min-height: 80px; }

    /* Pseudocode: bottom row = [char counter left] [post button right] */
    .form-row { display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }

    /* Pseudocode: counter colour changes based on remaining chars
       default → warn (gold) at 60 → over (red) at 20 */
    .char-count       { font-size: 0.75rem; color: #555; font-family: monospace; }
    .char-count.warn  { color: #c9a84c; }
    .char-count.over  { color: #e05c5c; }

    .post-form button {
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.4rem;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .post-form button:hover    { background: #e0bf6a; }
    .post-form button:disabled { background: #444; color: #777; cursor: default; }

    /* --- BOARD HEADER --- */
    /* Pseudocode: thin row showing total message count (left) and last-post timestamp (right) */
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid #2a2a5a;
      padding-bottom: 0.5rem;
    }
    .board-header span { font-size: 0.8rem; color: #888; font-family: monospace; letter-spacing: 0.05em; }

    /* --- MESSAGE CARDS --- */
    /* Pseudocode: vertical stack of cards, newest at top */
    .messages { display: flex; flex-direction: column; gap: 1rem; }

    .message {
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-left: 3px solid #c9a84c; /* gold left accent */
      border-radius: 0 6px 6px 0;
      padding: 1rem 1.2rem;
      animation: fadeIn 0.3s ease; /* slide in from top on creation */
    }

    /* Pseudocode: slide card down into position on entry */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Pseudocode: top row of card = [author name (left)] [timestamp (right)] */
    .message-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .message-author { font-size: 0.85rem; color: #c9a84c; font-weight: bold; letter-spacing: 0.03em; }
    .message-time   { font-size: 0.72rem; color: #555; font-family: monospace; }
    .message-text   { font-size: 0.95rem; line-height: 1.6; color: #ccc; word-break: break-word; }

    /* Pseudocode: action buttons row below message text */
    .message-actions { margin-top: 0.7rem; display: flex; gap: 0.6rem; }

    .btn-like, .btn-delete {
      font-size: 0.75rem;
      font-family: monospace;
      background: none;
      border: 1px solid #2a2a5a;
      border-radius: 3px;
      color: #888;
      cursor: pointer;
      padding: 0.2rem 0.6rem;
      transition: all 0.15s;
    }
    .btn-like:hover  { border-color: #c9a84c; color: #c9a84c; }
    .btn-like.liked  { border-color: #c9a84c; color: #c9a84c; background: #1e1a0e; } /* toggled state */
    .btn-delete:hover { border-color: #e05c5c; color: #e05c5c; }

    /* Pseudocode: shown when messages[] is empty */
    .empty { text-align: center; color: #444; font-size: 0.9rem; padding: 3rem 0; font-family: monospace; }
  </style>
</head>
<body>
  <!--
  ============================================================
  PSEUDOCODE — HTML STRUCTURE
  ============================================================
  CONTAINER
    HEADER
      h1: "Message Board"
      p:  subtitle

    POST FORM
      input#author    ← user's display name (optional)
      textarea#message ← message body (max 280 chars)
      FORM ROW
        span#charCount  ← live character countdown
        button          ← triggers postMessage()

    BOARD HEADER
      span#messageCount  ← e.g. "3 messages"
      span#lastUpdated   ← e.g. "last post 2m ago"

    div#board
      ← message cards injected here by renderBoard()
      ← shows empty state div when messages[] is empty
  ============================================================
  -->

  <div class="container">
    <header>
      <h1>Message Board</h1>
      <p>// public · open thread</p>
    </header>

    <div class="post-form">
      <input type="text" id="author" placeholder="Your name" maxlength="40" />
      <textarea id="message" placeholder="Write a message…" maxlength="280"></textarea>
      <div class="form-row">
        <span class="char-count" id="charCount">280 left</span>
        <button id="postBtn" onclick="postMessage()">Post</button>
      </div>
    </div>

    <div class="board-header">
      <span id="messageCount">0 messages</span>
      <span id="lastUpdated"></span>
    </div>

    <div class="messages" id="board">
      <div class="empty" id="emptyState">No messages yet. Be the first to post.</div>
    </div>
  </div>

  <script>
    /*
    ============================================================
    PSEUDOCODE — DATA
    ============================================================
    messages = []
    // Each message object:
    // {
    //   id:    Unix timestamp (used as unique key)
    //   author: string (defaults to "Anonymous")
    //   text:   string
    //   time:   Date object
    //   likes:  integer (starts at 0)
    //   liked:  boolean (has current user liked it?)
    // }
    ============================================================
    */
    const messages = [];

    const textarea  = document.getElementById('message');
    const charCount = document.getElementById('charCount');

    /*
    ============================================================
    PSEUDOCODE — CHARACTER COUNTER
    ============================================================
    ON textarea input event:
      remaining = 280 - textarea.length
      update charCount text to "${remaining} left"
      IF remaining < 20 → add class "over"  (red)
      ELSE IF remaining < 60 → add class "warn" (gold)
      ELSE → default style (grey)
    ============================================================
    */
    textarea.addEventListener('input', () => {
      const remaining = 280 - textarea.value.length;
      charCount.textContent = `${remaining} left`;
      charCount.className = 'char-count' + (remaining < 20 ? ' over' : remaining < 60 ? ' warn' : '');
    });

    /*
    ============================================================
    PSEUDOCODE — timeAgo(date)
    ============================================================
    FUNCTION timeAgo(date):
      diff = seconds since date was created

      IF diff < 10  → return "just now"
      IF diff < 60  → return "${diff}s ago"
      IF diff < 3600 → return "${minutes}m ago"
      ELSE           → return formatted time string (HH:MM)
    ============================================================
    */
    function timeAgo(date) {
      const diff = Math.floor((Date.now() - date) / 1000);
      if (diff < 10)   return 'just now';
      if (diff < 60)   return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    /*
    ============================================================
    PSEUDOCODE — postMessage()
    ============================================================
    FUNCTION postMessage():
      author = author input value (trimmed) OR "Anonymous"
      text   = textarea value (trimmed)

      IF text is empty → return early (do nothing)

      CREATE message object:
        id    = Date.now()    // unique timestamp-based ID
        author, text, time = new Date()
        likes = 0, liked = false

      PREPEND message to messages[]  // newest first
      CLEAR textarea
      RESET charCount to "280 left"
      CALL renderBoard()
    ============================================================
    */
    function postMessage() {
      const author = document.getElementById('author').value.trim() || 'Anonymous';
      const text   = textarea.value.trim();
      if (!text) return;

      const msg = { id: Date.now(), author, text, time: new Date(), likes: 0, liked: false };
      messages.unshift(msg);
      textarea.value = '';
      charCount.textContent = '280 left';
      charCount.className = 'char-count';
      renderBoard();
    }

    /*
    ============================================================
    PSEUDOCODE — toggleLike(id)
    ============================================================
    FUNCTION toggleLike(id):
      FIND message in messages[] where message.id === id
      IF not found → return

      FLIP message.liked (true ↔ false)
      IF now liked   → increment message.likes by 1
      IF now unliked → decrement message.likes by 1

      CALL renderBoard()
    ============================================================
    */
    function toggleLike(id) {
      const msg = messages.find(m => m.id === id);
      if (!msg) return;
      msg.liked = !msg.liked;
      msg.likes += msg.liked ? 1 : -1;
      renderBoard();
    }

    /*
    ============================================================
    PSEUDOCODE — deleteMessage(id)
    ============================================================
    FUNCTION deleteMessage(id):
      FIND index of message in messages[] where message.id === id
      IF found → remove 1 element at that index (splice)
      CALL renderBoard()
    ============================================================
    */
    function deleteMessage(id) {
      const idx = messages.findIndex(m => m.id === id);
      if (idx !== -1) messages.splice(idx, 1);
      renderBoard();
    }

    /*
    ============================================================
    PSEUDOCODE — renderBoard()
    ============================================================
    FUNCTION renderBoard():
      UPDATE messageCount text → "${n} message(s)"
      UPDATE lastUpdated text  → "last post X ago" (or blank if empty)

      IF messages[] is empty:
        SET board innerHTML to empty-state div
        RETURN

      FOR EACH message in messages[]:
        BUILD HTML card:
          .message-meta  → author name + timestamp
          .message-text  → escaped message body
          .message-actions →
            like button  (add "liked" class if message.liked is true)
            delete button

      SET board innerHTML to joined card HTML strings
    ============================================================
    */
    function renderBoard() {
      const board   = document.getElementById('board');
      const count   = document.getElementById('messageCount');
      const updated = document.getElementById('lastUpdated');

      count.textContent   = `${messages.length} message${messages.length !== 1 ? 's' : ''}`;
      updated.textContent = messages.length ? `last post ${timeAgo(messages[0].time)}` : '';

      if (!messages.length) {
        board.innerHTML = '<div class="empty" id="emptyState">No messages yet. Be the first to post.</div>';
        return;
      }

      board.innerHTML = messages.map(m => `
        <div class="message" id="msg-${m.id}">
          <div class="message-meta">
            <span class="message-author">${escapeHtml(m.author)}</span>
            <span class="message-time">${timeAgo(m.time)}</span>
          </div>
          <div class="message-text">${escapeHtml(m.text)}</div>
          <div class="message-actions">
            <button class="btn-like ${m.liked ? 'liked' : ''}" onclick="toggleLike(${m.id})">
              ♥ ${m.likes || 'Like'}
            </button>
            <button class="btn-delete" onclick="deleteMessage(${m.id})">✕ Delete</button>
          </div>
        </div>
      `).join('');
    }

    /*
    ============================================================
    PSEUDOCODE — escapeHtml(str)
    ============================================================
    FUNCTION escapeHtml(str):
      REPLACE & → &amp;   // must come first
      REPLACE < → &lt;
      REPLACE > → &gt;
      REPLACE " → &quot;
      RETURN sanitised string
      // Prevents XSS: user input is never executed as HTML
    ============================================================
    */
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /*
    ============================================================
    PSEUDOCODE — KEYBOARD SHORTCUT
    ============================================================
    ON textarea keydown:
      IF key is Enter AND (Ctrl or Cmd is held):
        CALL postMessage()
    ============================================================
    */
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) postMessage();
    });
  </script>
</body>
</html>
